<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MT Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splashScreen">
  <h1>Musaddique Traders</h1>
  <p>Belt Stock Manager</p>
</div>

<div id="loginPage">
  <div class="login-card">
    <h1>MT Manager</h1>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <input type="password" id="pin" placeholder="PIN">

    <button onclick="login()">Login</button>

    <p id="loginError"></p>
  </div>
</div>

<div id="app" class="hidden">

  <div class="layout">

    <aside class="sidebar">

      <h2 class="logo">MT Manager</h2>

      <button onclick="showPage('dashboard')">Dashboard</button>
      <button onclick="showPage('stock')">Stock</button>
      <button onclick="showPage('billing')">Billing</button>

    </aside>

    <main class="main-content">

      <section id="dashboardPage" class="page">

        <h2>Dashboard</h2>

        <div class="stats">

          <div class="card stat-card">
            <span>Total Stock</span>
            <h3 id="totalStock">0</h3>
          </div>

          <div class="card stat-card">
            <span>Total Sales</span>
            <h3 id="totalSales">₹0</h3>
          </div>

        </div>

      </section>

      <section id="stockPage" class="page hidden">

        <h2>Stock</h2>

        <div class="card form-card">

          <input type="text" id="stockCode" placeholder="Code">

          <input type="number" id="stockQty" placeholder="Qty">

          <button onclick="addStock()">Add Stock</button>

        </div>

        <div class="card">

          <table>

            <thead>
              <tr>
                <th>Code</th>
                <th>Qty</th>
              </tr>
            </thead>

            <tbody id="stockTable"></tbody>

          </table>

        </div>

      </section>

      <section id="billingPage" class="page hidden">

        <h2>Billing</h2>

        <div class="card form-card">

          <input type="text" id="customerName" placeholder="Customer">

          <input type="text" id="billCode" placeholder="Code">

          <input type="number" id="billQty" placeholder="Qty">

          <input type="number" id="billRate" placeholder="Rate">

          <button onclick="addBillItem()">Add Item</button>

        </div>

        <div class="card">

          <table>

            <thead>
              <tr>
                <th>Code</th>
                <th>Qty</th>
                <th>Rate</th>
                <th>Total</th>
              </tr>
            </thead>

            <tbody id="billTable"></tbody>

          </table>

          <button onclick="generateBill()">
            Generate Invoice
          </button>

        </div>

      </section>

    </main>

  </div>

</div>

<div id="toast"></div>

<script src="storage.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>

</body>
</html>
